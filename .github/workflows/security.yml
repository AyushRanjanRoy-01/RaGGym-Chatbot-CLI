name: Security

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . bandit pip-audit

      - name: Bandit (SAST)
        run: bandit -r src --severity-level high --confidence-level high

      - name: pip-audit (dependency CVEs)
        run: pip-audit
        continue-on-error: true # report-only until advisories are triaged

      - name: Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0" # report-only initially
