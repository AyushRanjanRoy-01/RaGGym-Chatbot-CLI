<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">RAGGym system architecture</title>
  <desc id="dsc">Layered architecture: clients, LangGraph agents, RAG core, swappable providers, data, and Azure infra, with a cross-cutting rail for config, observability, security and eval. Solid boxes run in both local and cloud modes; dashed boxes are cloud-only.</desc>
  <rect x="0" y="0" width="1000" height="500" fill="#ffffff"/>
  <style>
    .t{font-family:var(--font-voice,ui-sans-serif,system-ui,-apple-system,sans-serif);fill:var(--text-primary,#20232e)}
    .h{font-size:21px;font-weight:800}
    .tl{font-weight:700;font-size:11px;letter-spacing:.07em}
    .bt{font-size:12.5px;font-weight:650;text-anchor:middle}
    .bs{font-size:9.5px;text-anchor:middle;opacity:.72}
    .lg{font-size:11px;opacity:.85}
    .rl{font-size:11px;font-weight:700;letter-spacing:.06em;opacity:.8}
  </style>

  <!-- title + legend -->
  <text class="t h" x="24" y="33">🏋️ RAGGym — System Architecture</text>
  <line x1="540" y1="29" x2="566" y2="29" stroke="var(--text-primary,#20232e)" stroke-width="2"/>
  <text class="t lg" x="572" y="33">local + cloud</text>
  <line x1="700" y1="29" x2="726" y2="29" stroke="var(--text-primary,#20232e)" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="t lg" x="732" y="33">cloud-only</text>

  <!-- flow chevrons -->
  <g fill="var(--text-primary,#20232e)" opacity=".38">
    <path d="M400,120 l12,0 l-6,8 z"/>
    <path d="M400,188 l12,0 l-6,8 z"/>
    <path d="M400,256 l12,0 l-6,8 z"/>
    <path d="M400,324 l12,0 l-6,8 z"/>
    <path d="M400,392 l12,0 l-6,8 z"/>
  </g>

  <!-- ===== T1 Clients (blue) ===== -->
  <rect x="24" y="60" width="648" height="56" rx="12" fill="#3b82f6" fill-opacity=".06" stroke="#3b82f6" stroke-opacity=".35"/>
  <text class="t tl" x="36" y="92" fill="#3b82f6">CLIENTS</text>
  <g>
    <rect x="152" y="68" width="247" height="40" rx="8" fill="#3b82f6" fill-opacity=".15" stroke="#3b82f6" stroke-width="1.4"/>
    <text class="t bt" x="275" y="84">Streamlit UI</text><text class="t bs" x="275" y="99">streaming chat + sources</text>
    <rect x="413" y="68" width="247" height="40" rx="8" fill="#3b82f6" fill-opacity=".15" stroke="#3b82f6" stroke-width="1.4"/>
    <text class="t bt" x="536" y="84">CLI</text><text class="t bs" x="536" y="99">ingest · chat · practice · eval</text>
  </g>

  <!-- ===== T2 Agents (violet) ===== -->
  <rect x="24" y="128" width="648" height="56" rx="12" fill="#8b5cf6" fill-opacity=".06" stroke="#8b5cf6" stroke-opacity=".35"/>
  <text class="t tl" x="36" y="160" fill="#8b5cf6">AGENTS</text>
  <text class="t" x="36" y="172" font-size="8.5" opacity=".6">LangGraph</text>
  <g>
    <rect x="152" y="136" width="160" height="40" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text class="t bt" x="232" y="152">Chat</text><text class="t bs" x="232" y="167">retrieve → cite (CRAG)</text>
    <rect x="326" y="136" width="160" height="40" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text class="t bt" x="406" y="152">Debate</text><text class="t bs" x="406" y="167">Mentor ↔ Interviewer</text>
    <rect x="500" y="136" width="160" height="40" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text class="t bt" x="580" y="152">Practice</text><text class="t bs" x="580" y="167">gen · grade · review</text>
  </g>

  <!-- ===== T3 RAG core (indigo) ===== -->
  <rect x="24" y="196" width="648" height="56" rx="12" fill="#6366f1" fill-opacity=".06" stroke="#6366f1" stroke-opacity=".35"/>
  <text class="t tl" x="36" y="228" fill="#6366f1">RAG CORE</text>
  <g>
    <rect x="152" y="204" width="247" height="40" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text class="t bt" x="275" y="220">Ingestion</text><text class="t bs" x="275" y="235">PDF → chunks → embed</text>
    <rect x="413" y="204" width="247" height="40" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text class="t bt" x="536" y="220">Retrieval</text><text class="t bs" x="536" y="235">hybrid · multi-query · rerank</text>
  </g>

  <!-- ===== T4 Providers (amber) ===== -->
  <rect x="24" y="264" width="648" height="56" rx="12" fill="#f59e0b" fill-opacity=".07" stroke="#f59e0b" stroke-opacity=".4"/>
  <text class="t tl" x="36" y="296" fill="#d97706">PROVIDERS</text>
  <text class="t" x="36" y="308" font-size="8.5" opacity=".6">swappable</text>
  <g>
    <rect x="152" y="272" width="160" height="40" rx="8" fill="#f59e0b" fill-opacity=".16" stroke="#f59e0b" stroke-width="1.4"/>
    <text class="t bt" x="232" y="288">LLM</text><text class="t bs" x="232" y="303">Ollama·OpenAI·Anthropic·Azure</text>
    <rect x="326" y="272" width="160" height="40" rx="8" fill="#f59e0b" fill-opacity=".16" stroke="#f59e0b" stroke-width="1.4"/>
    <text class="t bt" x="406" y="288">Embeddings</text><text class="t bs" x="406" y="303">fastembed·Ollama·OpenAI</text>
    <rect x="500" y="272" width="160" height="40" rx="8" fill="#f59e0b" fill-opacity=".16" stroke="#f59e0b" stroke-width="1.4"/>
    <text class="t bt" x="580" y="288">Vector store</text><text class="t bs" x="580" y="303">Qdrant·pgvector·Chroma</text>
  </g>

  <!-- ===== T5 Data (teal) ===== -->
  <rect x="24" y="332" width="648" height="56" rx="12" fill="#14b8a6" fill-opacity=".06" stroke="#14b8a6" stroke-opacity=".35"/>
  <text class="t tl" x="36" y="364" fill="#0d9488">DATA</text>
  <g>
    <rect x="152" y="340" width="160" height="40" rx="8" fill="#14b8a6" fill-opacity=".15" stroke="#14b8a6" stroke-width="1.4"/>
    <text class="t bt" x="232" y="356">Qdrant</text><text class="t bs" x="232" y="371">local on-disk (default)</text>
    <rect x="326" y="340" width="160" height="40" rx="8" fill="#14b8a6" fill-opacity=".15" stroke="#14b8a6" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text class="t bt" x="406" y="356">Supabase pgvector</text><text class="t bs" x="406" y="371">Postgres + HNSW (cloud)</text>
    <rect x="500" y="340" width="160" height="40" rx="8" fill="#14b8a6" fill-opacity=".15" stroke="#14b8a6" stroke-width="1.4"/>
    <text class="t bt" x="580" y="356">Books corpus</text><text class="t bs" x="580" y="371">PDFs in data/books</text>
  </g>

  <!-- ===== Infra band (green, cloud) ===== -->
  <rect x="24" y="404" width="648" height="72" rx="12" fill="#22c55e" fill-opacity=".06" stroke="#22c55e" stroke-opacity=".4" stroke-dasharray="6 4"/>
  <text class="t tl" x="36" y="421" fill="#16a34a">AZURE INFRA · Terraform</text>
  <text class="t" x="210" y="421" font-size="9" opacity=".6">cloud-only · cost ≈ $0</text>
  <g>
    <rect x="152" y="430" width="119" height="36" rx="8" fill="#22c55e" fill-opacity=".15" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="211" y="446">Container Apps</text><text class="t bs" x="211" y="459">scale-to-zero</text>
    <rect x="281" y="430" width="119" height="36" rx="8" fill="#22c55e" fill-opacity=".15" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="340" y="446">Key Vault</text><text class="t bs" x="340" y="459">secrets</text>
    <rect x="410" y="430" width="119" height="36" rx="8" fill="#22c55e" fill-opacity=".15" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="469" y="446">App Insights</text><text class="t bs" x="469" y="459">telemetry</text>
    <rect x="539" y="430" width="119" height="36" rx="8" fill="#22c55e" fill-opacity=".15" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="598" y="446">GHCR</text><text class="t bs" x="598" y="459">image registry</text>
  </g>

  <!-- ===== Cross-cutting rail (slate) ===== -->
  <line x1="686" y1="68" x2="686" y2="388" stroke="#64748b" stroke-width="1.4" stroke-dasharray="3 4" opacity=".5"/>
  <text class="t rl" x="696" y="53" fill="#64748b">CROSS-CUTTING</text>
  <g>
    <rect x="696" y="60" width="280" height="94" rx="10" fill="#64748b" fill-opacity=".1" stroke="#64748b" stroke-width="1.3"/>
    <text class="t bt" x="836" y="92">Config</text>
    <text class="t bs" x="836" y="110">pydantic-settings · structlog</text>
    <text class="t bs" x="836" y="124">RAGGYM_MODE: local | cloud</text>

    <rect x="696" y="166" width="280" height="94" rx="10" fill="#64748b" fill-opacity=".1" stroke="#64748b" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="836" y="198">Observability</text>
    <text class="t bs" x="836" y="216">OpenTelemetry (GenAI semconv)</text>
    <text class="t bs" x="836" y="230">App Insights · Langfuse</text>

    <rect x="696" y="272" width="280" height="94" rx="10" fill="#64748b" fill-opacity=".1" stroke="#64748b" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text class="t bt" x="836" y="304">Security</text>
    <text class="t bs" x="836" y="322">Key Vault · managed identity</text>
    <text class="t bs" x="836" y="336">Supabase RLS · CI scans</text>

    <rect x="696" y="378" width="280" height="94" rx="10" fill="#64748b" fill-opacity=".1" stroke="#64748b" stroke-width="1.3"/>
    <text class="t bt" x="836" y="410">Eval</text>
    <text class="t bs" x="836" y="428">RAGAS — faithfulness, recall,</text>
    <text class="t bs" x="836" y="442">relevancy, context precision</text>
  </g>
</svg>
