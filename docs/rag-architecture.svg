<svg viewBox="0 0 980 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">RAG system design data flow</title>
  <desc id="d">Indexing (offline): documents are parsed, chunked, embedded and written to the vector store. Query (online): the question is embedded, used to retrieve top-k chunks, reranked, assembled with the question into a prompt, and sent to the LLM for a cited answer. A dashed corrective loop grades results and rewrites the query to retry.</desc>
  <rect x="0" y="0" width="980" height="440" fill="#ffffff"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" fill="#1f2430">

    <text x="24" y="33" font-size="19" font-weight="800">RAG System Design — indexing &amp; query flow</text>
    <line x1="712" y1="29" x2="740" y2="29" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="746" y="33" font-size="10" opacity=".85">corrective loop (CRAG)</text>

    <!-- lane labels -->
    <text x="24" y="72" font-size="12" font-weight="700" fill="#6366f1">① INDEXING · offline</text>
    <text x="24" y="320" font-size="12" font-weight="700" fill="#8b5cf6">② QUERY · online</text>

    <!-- ===== Indexing nodes (indigo) ===== -->
    <rect x="24" y="84" width="140" height="50" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text x="94" y="105" font-size="13" font-weight="650" text-anchor="middle">Documents</text>
    <text x="94" y="120" font-size="9.5" text-anchor="middle" opacity=".72">PDFs / books</text>
    <rect x="186" y="84" width="140" height="50" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text x="256" y="105" font-size="13" font-weight="650" text-anchor="middle">Load &amp; Parse</text>
    <text x="256" y="120" font-size="9.5" text-anchor="middle" opacity=".72">pymupdf4llm → md</text>
    <rect x="348" y="84" width="140" height="50" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text x="418" y="105" font-size="13" font-weight="650" text-anchor="middle">Chunk</text>
    <text x="418" y="120" font-size="9.5" text-anchor="middle" opacity=".72">split + metadata</text>
    <rect x="510" y="84" width="140" height="50" rx="8" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.4"/>
    <text x="580" y="105" font-size="13" font-weight="650" text-anchor="middle">Embeddings</text>
    <text x="580" y="120" font-size="9.5" text-anchor="middle" opacity=".72">dense vectors</text>

    <!-- indexing arrows -->
    <g stroke="#94a3b8" stroke-width="1.6">
      <line x1="164" y1="109" x2="180" y2="109"/>
      <line x1="326" y1="109" x2="342" y2="109"/>
      <line x1="488" y1="109" x2="504" y2="109"/>
      <path d="M580,134 V168 H505 V190" fill="none"/>
    </g>
    <polygon points="180,106 180,112 186,109" fill="#94a3b8"/>
    <polygon points="342,106 342,112 348,109" fill="#94a3b8"/>
    <polygon points="504,106 504,112 510,109" fill="#94a3b8"/>
    <polygon points="502,190 508,190 505,196" fill="#94a3b8"/>
    <text x="556" y="182" font-size="9" text-anchor="middle" opacity=".6">write vectors</text>

    <!-- ===== Vector store (amber, central) ===== -->
    <rect x="430" y="196" width="150" height="76" rx="10" fill="#f59e0b" fill-opacity=".18" stroke="#f59e0b" stroke-width="1.9"/>
    <text x="505" y="224" font-size="13.5" font-weight="750" text-anchor="middle">Vector Store</text>
    <text x="505" y="241" font-size="9.5" text-anchor="middle" opacity=".72">dense vectors · HNSW</text>
    <text x="505" y="256" font-size="9.5" text-anchor="middle" opacity=".72">Qdrant / Chroma</text>

    <!-- ===== Query nodes ===== -->
    <rect x="24" y="330" width="122" height="50" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="85" y="351" font-size="13" font-weight="650" text-anchor="middle">User Query</text>
    <text x="85" y="366" font-size="9.5" text-anchor="middle" opacity=".72">question</text>
    <rect x="158" y="330" width="122" height="50" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="219" y="351" font-size="13" font-weight="650" text-anchor="middle">Embed Query</text>
    <text x="219" y="366" font-size="9.5" text-anchor="middle" opacity=".72">same model</text>
    <rect x="292" y="330" width="122" height="50" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="353" y="351" font-size="13" font-weight="650" text-anchor="middle">Retrieve</text>
    <text x="353" y="366" font-size="9.5" text-anchor="middle" opacity=".72">top-k · lexical fallback</text>
    <rect x="426" y="330" width="122" height="50" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="487" y="351" font-size="13" font-weight="650" text-anchor="middle">Rerank</text>
    <text x="487" y="366" font-size="9.5" text-anchor="middle" opacity=".72">cross-encoder · opt</text>
    <rect x="560" y="330" width="122" height="50" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.4"/>
    <text x="621" y="351" font-size="13" font-weight="650" text-anchor="middle">Build Prompt</text>
    <text x="621" y="366" font-size="9.5" text-anchor="middle" opacity=".72">context + question</text>
    <rect x="694" y="330" width="122" height="50" rx="8" fill="#22c55e" fill-opacity=".16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="755" y="351" font-size="13" font-weight="650" text-anchor="middle">LLM</text>
    <text x="755" y="366" font-size="9.5" text-anchor="middle" opacity=".72">grounded generation</text>
    <rect x="828" y="330" width="122" height="50" rx="8" fill="#3b82f6" fill-opacity=".16" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="889" y="351" font-size="13" font-weight="650" text-anchor="middle">Answer</text>
    <text x="889" y="366" font-size="9.5" text-anchor="middle" opacity=".72">+ citations</text>

    <!-- query arrows -->
    <g stroke="#94a3b8" stroke-width="1.6">
      <line x1="146" y1="355" x2="152" y2="355"/>
      <line x1="280" y1="355" x2="286" y2="355"/>
      <line x1="414" y1="355" x2="420" y2="355"/>
      <line x1="548" y1="355" x2="554" y2="355"/>
      <line x1="682" y1="355" x2="688" y2="355"/>
      <line x1="816" y1="355" x2="822" y2="355"/>
      <path d="M505,272 V302 H353 V324" fill="none"/>
    </g>
    <polygon points="152,352 152,358 158,355" fill="#94a3b8"/>
    <polygon points="286,352 286,358 292,355" fill="#94a3b8"/>
    <polygon points="420,352 420,358 426,355" fill="#94a3b8"/>
    <polygon points="554,352 554,358 560,355" fill="#94a3b8"/>
    <polygon points="688,352 688,358 694,355" fill="#94a3b8"/>
    <polygon points="822,352 822,358 828,355" fill="#94a3b8"/>
    <polygon points="350,324 356,324 353,330" fill="#94a3b8"/>
    <text x="372" y="300" font-size="9" text-anchor="middle" opacity=".6">top-k chunks</text>

    <!-- corrective loop -->
    <path d="M487,380 V406 H353 V386" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polygon points="350,386 356,386 353,380" fill="#8b5cf6"/>
    <text x="420" y="424" font-size="9.5" text-anchor="middle" fill="#8b5cf6" opacity=".9">grade → rewrite → retry</text>
  </g>
</svg>
